<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gestão Perfumes</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>Gestão Perfumes</h1>
<p id="resumo"></p>
</header>

<nav>
<button onclick="abrir('dash')">🏠</button>
<button onclick="abrir('produto')">📦</button>
<button onclick="abrir('venda')">🛒</button>
<button onclick="abrir('troca')">🔁</button>
<button onclick="abrir('financeiro')">💳</button>
<button onclick="abrir('historico')">📋</button>
</nav>

<section id="dash"></section>

<section id="produto">
<h2>Produto</h2>
<input id="nome" placeholder="Nome">
<input id="custo" type="number" placeholder="Custo">
<input id="preco" type="number" placeholder="Preço venda">
<input id="qtd" type="number" placeholder="Quantidade">
<button onclick="novoProduto()">Adicionar</button>
<div id="produtos"></div>
</section>

<section id="venda">
<h2>Venda</h2>
<select id="vProd"></select>
<input id="vQtd" type="number" placeholder="Quantidade">
<select id="tipoVenda">
<option value="normal">Eu vendi</option>
<option value="terceiro">Vendedor externo</option>
</select>
<button onclick="vender()">Registrar</button>
</section>

<section id="troca">
<h2>Troca</h2>
<select id="tSai"></select>
<input id="tSaiQtd" type="number" placeholder="Quantidade saiu">
<select id="tEnt"></select>
<input id="tEntQtd" type="number" placeholder="Quantidade entrou">
<button onclick="trocar()">Trocar</button>
</section>

<section id="financeiro">
<h2>Fornecedor</h2>
<input id="valorDivida" type="number" placeholder="Nova dívida">
<input id="parcelas" type="number" placeholder="Parcelas">
<button onclick="novaDivida()">Adicionar</button>
<button onclick="backup()">Exportar Backup</button>
<input type="file" onchange="restaurar(event)">
</section>

<section id="historico">
<h2>Histórico</h2>
<div id="logs"></div>
</section>

<script src="app.js"></script>
</body>
</html>
