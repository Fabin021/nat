<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gestão Perfumes PRO</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<header>
<h1>💎 Perfumes PRO</h1>
<div id="topo"></div>
</header>

<main>
<section id="home"></section>

<section id="produtos">
<h2>📦 Produtos</h2>
<input id="nome" placeholder="Produto">
<input id="custo" type="number" placeholder="Custo">
<input id="preco" type="number" placeholder="Venda TikTok">
<input id="qtd" type="number" placeholder="Quantidade">
<button onclick="salvarProduto()">Salvar Produto</button>
<div id="lista"></div>
</section>

<section id="vendas">
<h2>🛒 Venda</h2>
<select id="produtoVenda"></select>
<input id="qtdVenda" type="number" placeholder="Quantidade">
<select id="quem">
<option value="eu">Eu vendi</option>
<option value="outro">Vendedor externo</option>
</select>
<button onclick="vender()">Registrar Venda</button>
</section>

<section id="trocas">
<h2>🔁 Trocas</h2>
<select id="produtoSai"></select>
<input id="qtdSai" type="number" placeholder="Quantidade saiu">
<select id="produtoEnt"></select>
<input id="qtdEnt" type="number" placeholder="Quantidade entrou">
<button onclick="trocar()">Registrar Troca</button>
</section>

<section id="config">
<h2>⚙️ Configurações</h2>
<input id="comissao" placeholder="Comissão TikTok %">
<input id="frete" placeholder="Frete %">
<input id="fixa" placeholder="Taxa fixa">
<input id="terceiro" placeholder="Vendedor externo %">
<button onclick="salvarTaxas()">Salvar Taxas</button>

<hr>

<button onclick="exportar()">Exportar Backup</button>
<input type="file" onchange="importar(event)">
</section>

<section id="historico">
<h2>📋 Histórico</h2>
<div id="logs"></div>
</section>
</main>

<nav>
<button onclick="abrir('home')">🏠</button>
<button onclick="abrir('produtos')">📦</button>
<button onclick="abrir('vendas')">🛒</button>
<button onclick="abrir('trocas')">🔁</button>
<button onclick="abrir('config')">⚙️</button>
<button onclick="abrir('historico')">📋</button>
</nav>

<script src="app.js"></script>
</body>
</html>
